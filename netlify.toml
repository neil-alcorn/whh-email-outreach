[build]
  publish = "public"
  functions = "netlify/functions"

[[redirects]]
  from = "/"
  to = "/survey/"
  status = 200

[[redirects]]
  from = "/survey"
  to = "/survey/"
  status = 301

[[headers]]
  for = "/survey/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
